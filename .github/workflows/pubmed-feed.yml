name: PubMed Discord Feed

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  post-papers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install requests anthropic
      - name: Cache seen papers
        uses: actions/cache@v4
        with:
          path: seen_pubmed.json
          key: seen-pubmed-v2-${{ github.run_id }}
          restore-keys: seen-pubmed-v2-
      - name: Run feed
        run: python pubmed_feed.py
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PUBMED_API_KEY: ${{ secrets.PUBMED_API_KEY }}
