# .github/workflows/trials-feed.yml
name: Clinical Trials Discord Feed

on:
  schedule:
   - cron: '0 13 * * *'   # daily 8am Central
  workflow_dispatch:        # Also allows manual trigger from GitHub UI

jobs:
  post-trials:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests anthropic

      - name: Cache seen trials
        uses: actions/cache@v4
        with:
          path: seen_trials.json
          key: seen-trials-v2-${{ github.run_id }}
          restore-keys: seen-trials-v2-

      - name: Run feed
        run: python trials_feed.py
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PUBMED_API_KEY: ${{ secrets.PUBMED_API_KEY }}
